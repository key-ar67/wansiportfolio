<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSS Positioning Task</title>
<style>
  body {
    height: 3000px;
    margin: 0;
    font-family: Arial, sans-serif;
  }

  .close-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    background: black;
    color: white;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    cursor: pointer;
  }

  .fixed-box {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 320px;
    height: 180px;
    background: gray;
  }

  .container {
    margin-top: 150px;
    text-align: center;
  }

  .card {
    position: relative;
    display: inline-block;
    margin: 20px;
  }

  .card img {
    width: 250px;
    height: auto;
  }

  .badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: black;
    color: white;
    padding: 5px 10px;
    font-size: 12px;
  }

  .add-cart {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    padding: 8px 12px;
    border: 1px solid black;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="close-btn">X</div>

<div class="fixed-box"></div>

<div class="container">
  
  <div class="card">
    <img src="tshirt.jpg" alt="Shirt">
    <div class="badge">20% OFF</div>
  </div>

  <div class="card">
    <img src="tshirt.jpg" alt="Shirt">
    <div class="badge">20% OFF</div>
    <div class="add-cart">Add to Cart</div>
  </div>

</div>

</body>
</html
